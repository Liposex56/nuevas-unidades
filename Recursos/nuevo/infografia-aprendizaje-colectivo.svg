<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Infografía sobre aprendizaje organizacional</title>
  <desc id="desc">Cinco movimientos clave para convertir experiencia individual en mejora colectiva.</desc>
  <rect width="1200" height="760" rx="32" fill="#06120f"/>
  <rect x="38" y="38" width="1124" height="684" rx="28" fill="#0d211c" stroke="#49e6cf" stroke-width="2" opacity=".55"/>

  <text x="76" y="104" fill="#42f5d4" font-family="Arial,Segoe UI,sans-serif" font-size="30" font-weight="800">APRENDIZAJE ORGANIZACIONAL</text>
  <text x="76" y="158" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="48" font-weight="900">Personas que aprenden juntas</text>
  <text x="76" y="203" fill="#d8fff7" font-family="Arial,Segoe UI,sans-serif" font-size="22">La experiencia individual se convierte en mejora colectiva cuando se comparte.</text>

  <circle cx="294" cy="442" r="175" fill="#15372f"/>
  <circle cx="294" cy="442" r="128" fill="none" stroke="#5eead4" stroke-width="5"/>
  <circle cx="294" cy="371" r="39" fill="#5eead4"/>
  <circle cx="226" cy="474" r="39" fill="#8aa2ff"/>
  <circle cx="362" cy="474" r="39" fill="#ffd166"/>
  <path d="M240 420 Q294 475 348 420" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <path d="M240 520 Q294 575 348 520" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <text x="128" y="654" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="28" font-weight="900">Comunidad de práctica</text>

  <rect x="520" y="268" width="602" height="388" rx="26" fill="#10271f" stroke="#5eead4" stroke-width="2" opacity=".92"/>
  <text x="558" y="329" fill="#ffd166" font-family="Arial,Segoe UI,sans-serif" font-size="30" font-weight="900">Cinco movimientos clave</text>

  <rect x="558" y="370" width="250" height="72" rx="14" fill="#153d35"/>
  <text x="580" y="404" fill="#42f5d4" font-family="Arial,Segoe UI,sans-serif" font-size="20" font-weight="900">1. Dominio personal</text>
  <text x="580" y="431" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="19">Mejora continua.</text>

  <rect x="840" y="370" width="250" height="72" rx="14" fill="#17284b"/>
  <text x="862" y="404" fill="#8aa2ff" font-family="Arial,Segoe UI,sans-serif" font-size="20" font-weight="900">2. Modelos mentales</text>
  <text x="862" y="431" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="19">Revisar supuestos.</text>

  <rect x="558" y="465" width="250" height="72" rx="14" fill="#3d3113"/>
  <text x="580" y="499" fill="#ffd166" font-family="Arial,Segoe UI,sans-serif" font-size="20" font-weight="900">3. Visión compartida</text>
  <text x="580" y="526" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="19">Metas comunes.</text>

  <rect x="840" y="465" width="250" height="72" rx="14" fill="#143522"/>
  <text x="862" y="499" fill="#7bd88f" font-family="Arial,Segoe UI,sans-serif" font-size="19" font-weight="900">4. Aprendizaje en equipo</text>
  <text x="862" y="526" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="19">Diálogo y práctica.</text>

  <rect x="558" y="560" width="532" height="82" rx="14" fill="#203516"/>
  <text x="580" y="593" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="20" font-weight="900">5. Pensamiento sistémico</text>
  <text x="580" y="624" fill="#d8fff7" font-family="Arial,Segoe UI,sans-serif" font-size="19">Relacionar causas, efectos y decisiones.</text>
</svg>
