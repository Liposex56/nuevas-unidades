<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Infografía sobre ecosistema digital</title>
  <desc id="desc">Herramientas digitales conectadas alrededor de un repositorio de conocimiento.</desc>
  <rect width="1200" height="760" rx="32" fill="#06120f"/>
  <rect x="38" y="38" width="1124" height="684" rx="28" fill="#0d211c" stroke="#49e6cf" stroke-width="2" opacity=".55"/>

  <text x="76" y="104" fill="#42f5d4" font-family="Arial,Segoe UI,sans-serif" font-size="30" font-weight="800">ECOSISTEMA DIGITAL</text>
  <text x="76" y="158" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="46" font-weight="900">Plataformas conectadas, no islas</text>
  <text x="76" y="203" fill="#d8fff7" font-family="Arial,Segoe UI,sans-serif" font-size="22">El valor aparece cuando las herramientas trabajan juntas y dejan trazabilidad.</text>

  <line x1="600" y1="292" x2="600" y2="595" stroke="#5eead4" stroke-width="5"/>
  <line x1="258" y1="444" x2="942" y2="444" stroke="#5eead4" stroke-width="5"/>

  <rect x="432" y="372" width="336" height="145" rx="28" fill="#15372f" stroke="#5eead4" stroke-width="5"/>
  <text x="504" y="430" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="31" font-weight="900">Repositorio</text>
  <text x="492" y="468" fill="#d8fff7" font-family="Arial,Segoe UI,sans-serif" font-size="22">memoria institucional</text>

  <rect x="488" y="246" width="224" height="102" rx="20" fill="#10271f" stroke="#7bd88f" stroke-width="2"/>
  <text x="572" y="288" fill="#7bd88f" font-family="Arial,Segoe UI,sans-serif" font-size="26" font-weight="900">IA</text>
  <text x="534" y="322" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="19">orientación</text>

  <rect x="100" y="376" width="232" height="136" rx="22" fill="#14251e" stroke="#ffd166" stroke-width="2"/>
  <text x="174" y="430" fill="#ffd166" font-family="Arial,Segoe UI,sans-serif" font-size="27" font-weight="900">LMS</text>
  <text x="153" y="468" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="20">formación</text>

  <rect x="868" y="376" width="232" height="136" rx="22" fill="#111d35" stroke="#89a2ff" stroke-width="2"/>
  <text x="925" y="430" fill="#89a2ff" font-family="Arial,Segoe UI,sans-serif" font-size="27" font-weight="900">Analítica</text>
  <text x="915" y="468" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="20">uso y brechas</text>

  <rect x="488" y="555" width="224" height="102" rx="20" fill="#2c1714" stroke="#ff7f70" stroke-width="2"/>
  <text x="512" y="598" fill="#ff7f70" font-family="Arial,Segoe UI,sans-serif" font-size="27" font-weight="900">Gobernanza</text>
  <text x="525" y="632" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="20">calidad y acceso</text>
</svg>
