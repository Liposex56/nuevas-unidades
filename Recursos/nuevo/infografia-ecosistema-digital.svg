<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Infografía: ecosistema digital</title>
  <desc id="desc">Arquitectura digital para movilizar conocimiento.</desc>
  <rect width="1200" height="760" rx="36" fill="#061713"/>
  <text x="70" y="82" fill="#5ee2c2" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="800">ECOSISTEMA DIGITAL</text>
  <text x="70" y="136" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="52" font-weight="900">Herramientas conectadas, no islas</text>
  <text x="70" y="184" fill="#d9ebe6" font-family="Inter,Segoe UI,sans-serif" font-size="24">Una plataforma solo genera valor si integra búsqueda, colaboración, analítica, seguridad y aprendizaje.</text>
  <g transform="translate(105 245)" font-family="Inter,Segoe UI,sans-serif">
    <rect x="340" y="120" width="300" height="150" rx="28" fill="#17302c" stroke="#5ee2c2" stroke-width="3"/>
    <text x="490" y="180" text-anchor="middle" fill="#fff" font-size="29" font-weight="950">Repositorio</text>
    <text x="490" y="216" text-anchor="middle" fill="#cfe8e0" font-size="19">memoria institucional</text>
    <g stroke="#5ee2c2" stroke-width="5" stroke-linecap="round">
      <path d="M340 196H80M640 196h260M490 120V30M490 270v95"/>
    </g>
    <g>
      <rect x="0" y="125" width="210" height="142" rx="22" fill="#10221f" stroke="#f3c75f"/><text x="105" y="174" text-anchor="middle" fill="#f3c75f" font-size="24" font-weight="900">LMS</text><text x="105" y="208" text-anchor="middle" fill="#f3ead0" font-size="18">formación</text><text x="105" y="234" text-anchor="middle" fill="#f3ead0" font-size="18">y rutas</text>
      <rect x="770" y="125" width="210" height="142" rx="22" fill="#10221f" stroke="#8ea8ff"/><text x="875" y="174" text-anchor="middle" fill="#8ea8ff" font-size="24" font-weight="900">Analítica</text><text x="875" y="208" text-anchor="middle" fill="#d7ddf4" font-size="18">uso y brechas</text>
      <rect x="385" y="-35" width="210" height="142" rx="22" fill="#10221f" stroke="#86d69f"/><text x="490" y="14" text-anchor="middle" fill="#86d69f" font-size="24" font-weight="900">IA</text><text x="490" y="48" text-anchor="middle" fill="#dcf3e2" font-size="18">búsqueda y</text><text x="490" y="74" text-anchor="middle" fill="#dcf3e2" font-size="18">orientación</text>
      <rect x="385" y="365" width="210" height="142" rx="22" fill="#10221f" stroke="#ff806f"/><text x="490" y="414" text-anchor="middle" fill="#ff806f" font-size="24" font-weight="900">Gobernanza</text><text x="490" y="448" text-anchor="middle" fill="#ffe0dc" font-size="18">calidad, ética</text><text x="490" y="474" text-anchor="middle" fill="#ffe0dc" font-size="18">y permisos</text>
    </g>
  </g>
  <text x="105" y="700" fill="#f3c75f" font-family="Inter,Segoe UI,sans-serif" font-size="25" font-weight="900">Principio:</text>
  <text x="235" y="700" fill="#d9ebe6" font-family="Inter,Segoe UI,sans-serif" font-size="25">la tecnología debe hacer visible el conocimiento correcto para la persona correcta, en el momento correcto.</text>
</svg>
