<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Infografía sobre conocimiento organizacional</title>
  <desc id="desc">Relación entre conocimiento tácito, explícito y memoria institucional.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110f"/>
      <stop offset=".55" stop-color="#12352f"/>
      <stop offset="1" stop-color="#18213a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <text x="70" y="82" fill="#5ee2c2" font-family="Arial,Segoe UI,sans-serif" font-size="28" font-weight="800">GESTIÓN DEL CONOCIMIENTO</text>
  <text x="70" y="136" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="44" font-weight="900">Del saber personal a la memoria compartida</text>
  <text x="70" y="178" fill="#d9ebe6" font-family="Arial,Segoe UI,sans-serif" font-size="22">La organización aprende cuando captura, ordena y reutiliza la experiencia.</text>

  <g font-family="Arial,Segoe UI,sans-serif">
    <g transform="translate(80 250)">
      <rect width="310" height="290" rx="26" fill="#102b25" stroke="#5ee2c2" stroke-width="3"/>
      <circle cx="72" cy="70" r="42" fill="#5ee2c2"/>
      <text x="38" y="150" fill="#ffffff" font-size="28" font-weight="900">Tácito</text>
      <text x="38" y="195" fill="#d9ebe6" font-size="20">Experiencia, intuición</text>
      <text x="38" y="225" fill="#d9ebe6" font-size="20">y criterio práctico.</text>
      <text x="38" y="260" fill="#f3c75f" font-size="18" font-weight="800">Vive en las personas.</text>
    </g>
    <g transform="translate(445 250)">
      <rect width="310" height="290" rx="26" fill="#13213b" stroke="#8ea8ff" stroke-width="3"/>
      <rect x="42" y="36" width="92" height="72" rx="14" fill="#8ea8ff"/>
      <rect x="154" y="36" width="64" height="82" rx="8" fill="none" stroke="#ffffff" stroke-width="8"/>
      <text x="38" y="150" fill="#ffffff" font-size="28" font-weight="900">Explícito</text>
      <text x="38" y="195" fill="#d9e0ff" font-size="20">Guías, protocolos,</text>
      <text x="38" y="225" fill="#d9e0ff" font-size="20">datos y documentos.</text>
      <text x="38" y="260" fill="#f3c75f" font-size="18" font-weight="800">Se puede compartir.</text>
    </g>
    <g transform="translate(810 250)">
      <rect width="310" height="290" rx="26" fill="#2a2412" stroke="#f3c75f" stroke-width="3"/>
      <circle cx="76" cy="72" r="44" fill="#f3c75f"/>
      <path d="M54 72h44M76 50v44" stroke="#07110f" stroke-width="9" stroke-linecap="round"/>
      <text x="38" y="150" fill="#ffffff" font-size="28" font-weight="900">Memoria</text>
      <text x="38" y="195" fill="#f8ecd0" font-size="20">Saber organizado,</text>
      <text x="38" y="225" fill="#f8ecd0" font-size="20">validado y accesible.</text>
      <text x="38" y="260" fill="#5ee2c2" font-size="18" font-weight="800">Permite reutilizar.</text>
    </g>
  </g>

  <g font-family="Arial,Segoe UI,sans-serif" font-size="22" font-weight="900">
    <rect x="115" y="610" width="190" height="58" rx="18" fill="#12352f" stroke="#5ee2c2"/>
    <text x="210" y="647" fill="#5ee2c2" text-anchor="middle">Observar</text>
    <rect x="370" y="610" width="190" height="58" rx="18" fill="#13213b" stroke="#8ea8ff"/>
    <text x="465" y="647" fill="#8ea8ff" text-anchor="middle">Documentar</text>
    <rect x="625" y="610" width="190" height="58" rx="18" fill="#2a2412" stroke="#f3c75f"/>
    <text x="720" y="647" fill="#f3c75f" text-anchor="middle">Organizar</text>
    <rect x="880" y="610" width="190" height="58" rx="18" fill="#122d24" stroke="#86d69f"/>
    <text x="975" y="647" fill="#86d69f" text-anchor="middle">Aplicar</text>
  </g>
</svg>
