<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Infografía sobre capital intelectual</title>
  <desc id="desc">Cómo organizar protocolos, investigaciones, guías y casos para reutilizar conocimiento.</desc>
  <rect width="1200" height="760" rx="32" fill="#071120"/>
  <rect x="38" y="38" width="1124" height="684" rx="28" fill="#0f1c35" stroke="#89a2ff" stroke-width="2" opacity=".62"/>

  <text x="76" y="104" fill="#89a2ff" font-family="Arial,Segoe UI,sans-serif" font-size="30" font-weight="800">CAPITAL INTELECTUAL</text>
  <text x="76" y="158" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="48" font-weight="900">Memoria que se puede reutilizar</text>
  <text x="76" y="203" fill="#dce6ff" font-family="Arial,Segoe UI,sans-serif" font-size="22">Investigaciones, protocolos, datos, guías y criterios de calidad.</text>

  <rect x="105" y="284" width="438" height="285" rx="28" fill="#101e38" stroke="#89a2ff" stroke-width="4"/>
  <rect x="165" y="332" width="288" height="56" rx="12" fill="#89a2ff"/>
  <text x="238" y="367" fill="#061120" font-family="Arial,Segoe UI,sans-serif" font-size="23" font-weight="900">Protocolos</text>
  <rect x="165" y="414" width="288" height="56" rx="12" fill="#5eead4"/>
  <text x="214" y="449" fill="#061120" font-family="Arial,Segoe UI,sans-serif" font-size="23" font-weight="900">Investigaciones</text>
  <rect x="165" y="496" width="288" height="56" rx="12" fill="#ffd166"/>
  <text x="226" y="531" fill="#061120" font-family="Arial,Segoe UI,sans-serif" font-size="23" font-weight="900">Guías y casos</text>

  <rect x="630" y="284" width="470" height="285" rx="28" fill="#101e38" stroke="#3d5a9d" stroke-width="2"/>
  <text x="666" y="340" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="30" font-weight="900">Debe tener</text>
  <circle cx="688" cy="392" r="14" fill="#89a2ff"/>
  <text x="722" y="401" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="24" font-weight="800">Metadatos comunes.</text>
  <circle cx="688" cy="444" r="14" fill="#5eead4"/>
  <text x="722" y="453" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="24" font-weight="800">Responsables claros.</text>
  <circle cx="688" cy="496" r="14" fill="#ffd166"/>
  <text x="722" y="505" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="24" font-weight="800">Calidad y permisos.</text>
  <circle cx="688" cy="548" r="14" fill="#ff7f70"/>
  <text x="722" y="556" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="23" font-weight="800">Buscador y medición.</text>

  <rect x="112" y="620" width="976" height="72" rx="18" fill="#0d2a35" stroke="#42f5d4" stroke-width="2"/>
  <text x="145" y="663" fill="#ffd166" font-family="Arial,Segoe UI,sans-serif" font-size="26" font-weight="900">Problema típico</text>
  <text x="390" y="663" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="23">Información dispersa, sin vigencia clara o difícil de encontrar.</text>
</svg>
