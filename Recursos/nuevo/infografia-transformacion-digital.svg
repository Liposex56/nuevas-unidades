<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Infografía sobre transformación digital</title>
  <desc id="desc">Relación entre personas, procesos, datos y gobernanza.</desc>
  <rect width="1200" height="760" rx="34" fill="#07131f"/>
  <text x="70" y="82" fill="#5ee2c2" font-family="Arial,Segoe UI,sans-serif" font-size="28" font-weight="800">TRANSFORMACIÓN DIGITAL</text>
  <text x="70" y="136" fill="#ffffff" font-family="Arial,Segoe UI,sans-serif" font-size="44" font-weight="900">Tecnología con propósito</text>
  <text x="70" y="178" fill="#d9ebe6" font-family="Arial,Segoe UI,sans-serif" font-size="22">Digitalizar solo sirve si mejora la circulación del conocimiento.</text>

  <g font-family="Arial,Segoe UI,sans-serif">
    <circle cx="600" cy="410" r="132" fill="#5ee2c2" stroke="#dffcf7" stroke-width="5"/>
    <text x="600" y="392" fill="#07110f" text-anchor="middle" font-size="30" font-weight="900">CONOCIMIENTO</text>
    <text x="600" y="430" fill="#07110f" text-anchor="middle" font-size="20" font-weight="800">accesible y útil</text>

    <g stroke="#dffcf7" stroke-width="6" stroke-linecap="round">
      <path d="M468 410H340M732 410h128M535 305l-74-74M665 305l74-74M535 515l-74 74M665 515l74 74"/>
    </g>

    <g transform="translate(110 350)">
      <rect width="230" height="120" rx="22" fill="#10221f" stroke="#5ee2c2"/>
      <text x="28" y="46" fill="#5ee2c2" font-size="24" font-weight="900">Personas</text>
      <text x="28" y="80" fill="#d9ebe6" font-size="19">Formación y</text>
      <text x="28" y="106" fill="#d9ebe6" font-size="19">confianza.</text>
    </g>
    <g transform="translate(860 350)">
      <rect width="230" height="120" rx="22" fill="#2a2412" stroke="#f3c75f"/>
      <text x="28" y="46" fill="#f3c75f" font-size="24" font-weight="900">Procesos</text>
      <text x="28" y="80" fill="#f8ecd0" font-size="19">Roles, calidad</text>
      <text x="28" y="106" fill="#f8ecd0" font-size="19">y seguimiento.</text>
    </g>
    <g transform="translate(230 570)">
      <rect width="260" height="112" rx="22" fill="#13213b" stroke="#8ea8ff"/>
      <text x="28" y="44" fill="#8ea8ff" font-size="24" font-weight="900">Datos</text>
      <text x="28" y="78" fill="#d9e0ff" font-size="19">Evidencia para decidir.</text>
    </g>
    <g transform="translate(710 570)">
      <rect width="260" height="112" rx="22" fill="#311b18" stroke="#ff806f"/>
      <text x="28" y="44" fill="#ff806f" font-size="24" font-weight="900">Gobernanza</text>
      <text x="28" y="78" fill="#ffe0dc" font-size="19">Ética, acceso y cuidado.</text>
    </g>
  </g>
</svg>
